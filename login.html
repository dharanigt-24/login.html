<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:linear-gradient(135deg,#1e3c72,#2a5298);
    }

    .login-container{
        background:white;
        padding:30px;
        width:350px;
        border-radius:15px;
        box-shadow:0 5px 20px rgba(0,0,0,0.3);
        text-align:center;
    }

    .logo{
        width:120px;
        margin-bottom:15px;
    }

    h2{
        color:#1e3c72;
        margin-bottom:20px;
    }

    .input-box{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    .login-btn{
        width:100%;
        padding:12px;
        background:#1e3c72;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        margin-top:10px;
    }

    .login-btn:hover{
        background:#2a5298;
    }

    .forgot{
        display:block;
        margin-top:15px;
        text-decoration:none;
        color:#1e3c72;
        font-size:14px;
    }
</style>
</head>

<body>

<div class="login-container">

    <img src="kprcas.jpg" alt="KPRCAS Logo" class="logo">

    <h2>KPRCAS Login</h2>

    <form>
        <input type="text" class="input-box" placeholder="Username" required>

        <input type="password" class="input-box" placeholder="Password" required>

        <button type="submit" class="login-btn">Login</button>

        <a href="#" class="forgot">Forgot Password?</a>
    </form>

</div>

</body>
</html>
